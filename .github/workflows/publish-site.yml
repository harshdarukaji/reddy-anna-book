name: Publish Site & Daily Cricket News

on:
  schedule:
    # 6:00 AM IST (00:30 UTC) every day
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest cricket news
        run: npm run news:fetch

      - name: Commit news updates
        run: |
          git config user.name "Cricket News Bot"
          git config user.email "bot@reddyannabook.in"
          git add src/content/blog/news/ src/content/blog/cricket-news-posts.ts
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily cricket news update [skip ci]"
            git push
          fi

      - name: Build static site
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: https://harshdarukaji.github.io/reddy-anna-book
          NEXT_PUBLIC_WHATSAPP_LINK: https://wa.link/Reddyofficial
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
